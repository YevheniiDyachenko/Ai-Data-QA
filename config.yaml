project_id: example_project
dataset: analytics
location: US

ai:
  provider: openai
  model: gpt-4o-mini
  api_key_env_var: OPENAI_API_KEY

tests:
  output_dir: tests_generated
  default_checks:
    - not_null
    - uniqueness
    - regex
    - range

checks:
  accepted_values:
    enabled: true
    threshold: 0
  relationship:
    enabled: true
    threshold: 0
  freshness_sla:
    enabled: true
    threshold: 24
  row_count_drift:
    enabled: true
    threshold: 0.2
  schema_drift:
    enabled: true
    threshold: 0

report:
  output_dir: reports
